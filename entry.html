<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💻 交互式终端</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@4.19.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@4.19.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.5.0/lib/xterm-addon-fit.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            background: #0a0a0a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #app {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
        }

        /* 顶部状态栏 */
        .top-bar {
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid rgba(0, 255, 65, 0.15);
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            height: 48px;
            z-index: 10;
        }

        .top-bar .title {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #00ff41;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .top-bar .title .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .top-bar .title .dot.green {
            background: #00ff41;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        .top-bar .title .dot.yellow {
            background: #ffdd57;
            box-shadow: 0 0 10px rgba(255, 221, 87, 0.5);
        }

        .top-bar .title .dot.red {
            background: #ff3860;
            box-shadow: 0 0 10px rgba(255, 56, 96, 0.5);
        }

        .top-bar .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #8899aa;
            font-size: 13px;
        }

        .top-bar .user-info .username {
            color: #00ff41;
        }

        .top-bar .user-info .status {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .top-bar .user-info .status .dot-small {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .top-bar .user-info .status .dot-small.online {
            background: #00ff41;
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.5);
        }

        .top-bar .user-info .status .dot-small.offline {
            background: #ff3860;
            box-shadow: 0 0 8px rgba(255, 56, 96, 0.5);
        }

        .top-bar .user-info .status .dot-small.connecting {
            background: #ffdd57;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .top-bar .actions {
            display: flex;
            gap: 8px;
        }

        .top-bar .actions button {
            padding: 5px 14px;
            border: 1px solid rgba(0, 255, 65, 0.25);
            border-radius: 4px;
            background: transparent;
            color: #00ff41;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .top-bar .actions button:hover:not(:disabled) {
            background: rgba(0, 255, 65, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.15);
        }

        .top-bar .actions button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .top-bar .actions button.danger {
            border-color: rgba(255, 56, 96, 0.3);
            color: #ff3860;
        }

        .top-bar .actions button.danger:hover:not(:disabled) {
            background: rgba(255, 56, 96, 0.1);
            box-shadow: 0 0 15px rgba(255, 56, 96, 0.15);
        }

        /* 终端容器 */
        .terminal-wrapper {
            flex: 1;
            position: relative;
            background: #0a0a0a;
            overflow: hidden;
        }

        #terminal-xterm {
            width: 100%;
            height: 100%;
            padding: 0;
            background: #0a0a0a;
        }

        .xterm {
            padding: 0;
            height: 100%;
            width: 100%;
        }
        
        .xterm-viewport {
            overflow-y: auto !important;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 255, 65, 0.3) #0a0a0a;
        }
        
        .xterm-viewport::-webkit-scrollbar {
            width: 8px;
        }
        
        .xterm-viewport::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        
        .xterm-viewport::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 65, 0.25);
            border-radius: 4px;
        }
        
        .xterm-viewport::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 65, 0.4);
        }
        
        .xterm-screen {
            width: 100% !important;
        }
        
        .xterm canvas {
            position: absolute;
            left: 0;
            top: 0;
        }

        /* 登录遮罩 */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-overlay.hidden {
            display: none;
        }

        .login-card {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(0, 255, 65, 0.3);
            padding: 40px 32px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 255, 65, 0.05);
            width: 85%;
            max-width: 380px;
            text-align: center;
        }

        .login-card .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .login-card h3 {
            margin-bottom: 12px;
            font-size: 1.3rem;
            color: #00ff41;
            letter-spacing: 2px;
        }

        .login-card p {
            color: #8899aa;
            font-size: 0.85rem;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        #loginBtn {
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 12px 28px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.95rem;
            width: 100%;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        #loginBtn:hover:not(:disabled) {
            background: rgba(0, 255, 65, 0.1);
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.15);
        }

        #loginBtn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Toast 通知 */
        .notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            background: rgba(0, 0, 0, 0.92);
            border-radius: 6px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.6);
            z-index: 2000;
            border: 1px solid rgba(0, 255, 65, 0.15);
            color: #00ff41;
            font-size: 13px;
            max-width: 90%;
            text-align: center;
            animation: slideUp 0.3s ease;
            pointer-events: none;
        }

        .notification.success {
            border-color: rgba(0, 255, 65, 0.3);
        }

        .notification.error {
            border-color: rgba(255, 56, 96, 0.3);
            color: #ff3860;
        }

        .notification.info {
            border-color: rgba(100, 181, 246, 0.3);
            color: #64b5f6;
        }
        
        .notification.warning {
            border-color: rgba(255, 221, 87, 0.3);
            color: #ffdd57;
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 登录遮罩 -->
        <div class="login-overlay" id="loginOverlay">
            <div class="login-card">
                <div class="icon">💻</div>
                <h3>交互式终端</h3>
                <p>🔐 需要认证后才能使用<br>请先登录文件浏览器</p>
                <button id="loginBtn">
                    <span id="loginBtnText">验证身份</span>
                </button>
            </div>
        </div>

        <!-- 顶部状态栏 -->
        <div class="top-bar">
            <div class="title">
                <span class="dot green" id="statusDot"></span>
                <span id="statusText">终端</span>
                <span style="color: #8899aa; font-weight: normal; font-size: 12px;" id="sessionInfo"></span>
            </div>
            <div class="user-info">
                <span class="status">
                    <span class="dot-small offline" id="wsDot"></span>
                    <span id="wsStatusText">未连接</span>
                </span>
                <span class="username" id="usernameDisplay">未认证</span>
                <div class="actions">
                    <button id="connectBtn" onclick="connectWebSocket()" disabled>连接</button>
                    <button id="disconnectBtn" onclick="disconnectWebSocket()" disabled class="danger">断开</button>
                    <button onclick="logout()" class="danger">退出</button>
                </div>
            </div>
        </div>

        <!-- 终端 -->
        <div class="terminal-wrapper">
            <div id="terminal-xterm"></div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ========== 配置 ==========
            const DEBUG = true;
            const MAX_RECONNECT_ATTEMPTS = 5;
            const WS_URL = 'ws://127.0.0.1:5006';

            // ========== 全局状态 ==========
            let ws = null;
            let isAuthenticated = false;
            let isTerminalReady = false;
            let isConnecting = false;
            let reconnectAttempts = 0;
            let username = '';
            let sessionId = null;
            let terminal = null;
            let fitAddon = null;
            let resizeTimeout = null;
            let terminalResizeObserver = null;
            let inputBuffer = '';

            // DOM 元素
            const loginOverlay = document.getElementById('loginOverlay');
            const loginBtn = document.getElementById('loginBtn');
            const loginBtnText = document.getElementById('loginBtnText');
            const usernameDisplay = document.getElementById('usernameDisplay');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const sessionInfo = document.getElementById('sessionInfo');
            const connectBtn = document.getElementById('connectBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');
            const wsDot = document.getElementById('wsDot');
            const wsStatusText = document.getElementById('wsStatusText');
            const terminalXterm = document.getElementById('terminal-xterm');

            // ========== 调试日志 ==========
            function debugLog(message, data) {
                if (DEBUG) {
                    console.log(`[DEBUG] ${message}`, data || '');
                }
            }

            // ========== 通知 ==========
            function showNotification(message, type = 'info') {
                const existing = document.querySelector('.notification');
                if (existing) existing.remove();

                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.textContent = message;
                document.body.appendChild(notification);
                setTimeout(() => {
                    notification.style.opacity = '0';
                    notification.style.transition = 'opacity 0.3s';
                    setTimeout(() => notification.remove(), 300);
                }, 3000);
            }

            // ========== 更新状态 ==========
            function updateWSStatus(connected) {
                if (connected) {
                    wsDot.className = 'dot-small online';
                    wsStatusText.textContent = '已连接';
                    connectBtn.disabled = true;
                    disconnectBtn.disabled = false;
                } else {
                    wsDot.className = 'dot-small offline';
                    wsStatusText.textContent = '未连接';
                    connectBtn.disabled = !isAuthenticated;
                    disconnectBtn.disabled = true;
                }
            }

            function updateStatus(status, message) {
                statusDot.className = 'dot';
                switch(status) {
                    case 'connected':
                        statusDot.classList.add('green');
                        statusText.textContent = message || '已连接';
                        break;
                    case 'connecting':
                        statusDot.classList.add('yellow');
                        statusText.textContent = message || '连接中...';
                        break;
                    case 'error':
                        statusDot.classList.add('red');
                        statusText.textContent = message || '连接失败';
                        break;
                    default:
                        statusDot.classList.add('red');
                        statusText.textContent = message || '未连接';
                }
            }

            function updateUIForAuth(authenticated) {
                if (authenticated) {
                    loginOverlay.classList.add('hidden');
                    usernameDisplay.textContent = username || '用户';
                    connectBtn.disabled = false;
                } else {
                    loginOverlay.classList.remove('hidden');
                    usernameDisplay.textContent = '未认证';
                    connectBtn.disabled = true;
                    disconnectBtn.disabled = true;
                }
            }

            // ========== 终端管理 ==========
            function initTerminal() {
                destroyTerminal();

                terminalXterm.innerHTML = '';
                
                terminal = new Terminal({
                    cursorBlink: true,
                    cursorStyle: 'block',
                    theme: {
                        background: '#0a0a0a',
                        foreground: '#00ff41',
                        cursor: '#00ff41',
                        selection: 'rgba(0, 255, 65, 0.3)',
                        black: '#0a0a0a',
                        red: '#ff3860',
                        green: '#00ff41',
                        yellow: '#ffdd57',
                        blue: '#64b5f6',
                        magenta: '#b388ff',
                        cyan: '#00e5ff',
                        white: '#f0f0f0'
                    },
                    fontFamily: 'Menlo, Monaco, "Courier New", monospace',
                    fontSize: 14,
                    lineHeight: 1.2,
                    scrollback: 10000,
                    allowTransparency: true,
                    macOptionIsMeta: true,
                    convertEol: true,
                    disableStdin: false,
                    screenReaderMode: false
                });

                terminal.open(terminalXterm);

                try {
                    if (typeof FitAddon !== 'undefined') {
                        fitAddon = new FitAddon.FitAddon();
                        terminal.loadAddon(fitAddon);
                    }
                } catch (e) {
                    console.error('Failed to load fit addon:', e);
                }

                if (window.ResizeObserver) {
                    terminalResizeObserver = new ResizeObserver(() => {
                        fitTerminalWithDelay();
                    });
                    terminalResizeObserver.observe(terminalXterm);
                }

                // 关键修复：处理终端输入，将 \r 转换为 \r\n
                terminal.onData(data => {
                    if (isTerminalReady && ws && ws.readyState === WebSocket.OPEN) {
                        // 如果是回车键，发送 \r\n
                        if (data === '\r') {
                            sendRawData('\r\n');
                        } else {
                            sendRawData(data);
                        }
                    }
                });

                terminal.onResize(size => {
                    if (isTerminalReady && ws && ws.readyState === WebSocket.OPEN) {
                        sendMessage('resize', {
                            cols: size.cols,
                            rows: size.rows
                        });
                    }
                });

                window.addEventListener('resize', () => {
                    fitTerminalWithDelay();
                });

                setTimeout(() => fitTerminal(), 100);
                setTimeout(() => fitTerminal(), 300);
                setTimeout(() => fitTerminal(), 500);
            }

            function destroyTerminal() {
                if (terminalResizeObserver) {
                    terminalResizeObserver.disconnect();
                    terminalResizeObserver = null;
                }
                if (terminal) {
                    terminal.dispose();
                    terminal = null;
                    fitAddon = null;
                }
                if (resizeTimeout) {
                    clearTimeout(resizeTimeout);
                    resizeTimeout = null;
                }
            }

            function fitTerminal() {
                if (!terminal || !fitAddon) return;
                try {
                    fitAddon.fit();
                } catch (e) {
                    console.error('Failed to fit terminal:', e);
                }
            }

            function fitTerminalWithDelay() {
                if (resizeTimeout) clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => fitTerminal(), 100);
            }

            // ========== WebSocket 连接 ==========
            function connectWebSocket() {
                if (isConnecting || ws) {
                    return;
                }

                if (!isAuthenticated) {
                    showNotification('请先验证身份', 'error');
                    return;
                }

                isConnecting = true;
                updateStatus('connecting', '正在连接...');
                connectBtn.disabled = true;
                showNotification('正在连接 WebSocket...', 'info');

                debugLog(`Connecting to: ${WS_URL}`);

                try {
                    ws = new WebSocket(WS_URL);
                } catch (e) {
                    debugLog(`WebSocket creation error: ${e.message}`);
                    isConnecting = false;
                    updateStatus('error', '连接失败');
                    connectBtn.disabled = false;
                    showNotification(`创建连接失败: ${e.message}`, 'error');
                    return;
                }

                ws.onopen = function() {
                    debugLog('WebSocket connection opened');
                    isConnecting = false;
                    reconnectAttempts = 0;
                    updateWSStatus(true);
                    updateStatus('connected', '已连接');
                    connectBtn.disabled = true;
                    disconnectBtn.disabled = false;
                    showNotification('✅ WebSocket 连接已建立', 'success');
                };

                ws.onmessage = function(event) {
                    debugLog(`Received: ${event.data.substring(0, 200)}`);
                    handleMessage(event.data);
                };

                ws.onerror = function(error) {
                    debugLog('WebSocket error:', error);
                    isConnecting = false;
                    updateStatus('error', '连接错误');
                    connectBtn.disabled = false;
                    showNotification('WebSocket 连接错误', 'error');
                };

                ws.onclose = function(event) {
                    debugLog(`WebSocket closed: ${event.code}, ${event.reason}`);
                    isConnecting = false;
                    isTerminalReady = false;
                    updateWSStatus(false);
                    updateStatus('error', '已断开');
                    connectBtn.disabled = false;
                    disconnectBtn.disabled = true;
                    sessionInfo.textContent = '';
                    showNotification(`⚠️ 连接已断开`, 'warning');
                    
                    if (isAuthenticated) {
                        reconnectAttempts++;
                        if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                            const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 10000);
                            setTimeout(() => {
                                if (!ws || ws.readyState === WebSocket.CLOSED) {
                                    connectWebSocket();
                                }
                            }, delay);
                        }
                    }
                };
            }

            function disconnectWebSocket() {
                if (ws) {
                    if (isTerminalReady) {
                        sendMessage('disconnect', {});
                    }
                    ws.close();
                    ws = null;
                }
                isTerminalReady = false;
                sessionId = null;
                updateWSStatus(false);
                updateStatus('disconnected', '已断开');
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                sessionInfo.textContent = '';
                showNotification('已断开连接', 'info');
            }

            // ========== 消息处理 ==========
            function handleMessage(message) {
                try {
                    let data;
                    try {
                        data = JSON.parse(message);
                    } catch (e) {
                        if (terminal) {
                            terminal.write(message);
                        }
                        return;
                    }

                    const msgType = data.type || '';

                    switch(msgType) {
                        case 'connected':
                            sessionId = data.session_id;
                            isTerminalReady = true;
                            
                            if (!terminal) {
                                initTerminal();
                            }
                            
                            updateStatus('connected', '终端就绪');
                            sessionInfo.textContent = `会话: ${sessionId.substring(0, 8)}`;
                            showNotification('✅ 终端会话已建立', 'success');
                            
                            if (terminal) {
                                setTimeout(() => terminal.focus(), 100);
                            }
                            break;

                        case 'output':
                            if (data.data && terminal) {
                                terminal.write(data.data);
                            }
                            break;

                        case 'info':
                            showNotification(data.message, 'info');
                            break;

                        case 'error':
                            showNotification(data.message || '未知错误', 'error');
                            if (terminal) {
                                terminal.write(`\r\n\x1b[31m错误: ${data.message || '未知错误'}\x1b[0m\r\n`);
                            }
                            break;

                        case 'pong':
                            debugLog(`Pong received: ${data.timestamp}`);
                            break;

                        case 'disconnected':
                            isTerminalReady = false;
                            showNotification(`⚠️ ${data.message || '连接已断开'}`, 'warning');
                            if (terminal) {
                                terminal.write(`\r\n\x1b[33m${data.message || '连接已断开'}\x1b[0m\r\n`);
                            }
                            break;

                        default:
                            if (data.data && terminal) {
                                terminal.write(data.data);
                            } else if (data.message) {
                                showNotification(data.message, 'info');
                            }
                    }
                } catch (e) {
                    debugLog(`Error handling message: ${e.message}`);
                    if (terminal) {
                        terminal.write(message);
                    }
                }
            }

            // ========== 发送消息 ==========
            function sendMessage(type, data) {
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    return false;
                }

                const message = JSON.stringify({
                    type: type,
                    ...data
                });
                
                try {
                    ws.send(message);
                    return true;
                } catch (e) {
                    debugLog(`Send error: ${e.message}`);
                    return false;
                }
            }

            function sendRawData(data) {
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    return false;
                }

                const message = JSON.stringify({
                    type: 'command',
                    command: data
                });
                
                try {
                    ws.send(message);
                    return true;
                } catch (e) {
                    debugLog(`Send error: ${e.message}`);
                    return false;
                }
            }

            // ========== 认证 ==========
            async function checkAuth() {
                try {
                    debugLog('Checking authentication status...');
                    
                    const response = await fetch('/api/check-auth', {
                        credentials: 'include',
                        headers: { 'Accept': 'application/json' }
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                    const data = await response.json();
                    debugLog('Auth data:', data);
                    isAuthenticated = data.authenticated;
                    
                    if (isAuthenticated) {
                        username = data.user?.username || '用户';
                        updateUIForAuth(true);
                        showNotification(`✅ 已认证: ${username}`, 'success');
                        
                        setTimeout(() => {
                            if (!ws || ws.readyState === WebSocket.CLOSED) {
                                connectWebSocket();
                            }
                        }, 500);
                    } else {
                        updateUIForAuth(false);
                        showNotification('🔒 请先登录文件浏览器', 'warning');
                    }
                } catch (error) {
                    console.warn('认证检查失败:', error);
                    updateUIForAuth(false);
                    showNotification('认证检查失败，请刷新重试', 'error');
                }
            }

            async function handleLogin() {
                loginBtn.disabled = true;
                loginBtnText.textContent = '验证中...';
                debugLog('Login button clicked');
                
                await checkAuth();
                
                if (isAuthenticated) {
                    loginBtnText.textContent = '✅ 已验证';
                    setTimeout(() => {
                        loginBtn.disabled = false;
                        loginBtnText.textContent = '验证身份';
                    }, 2000);
                } else {
                    loginBtn.disabled = false;
                    loginBtnText.textContent = '重新验证';
                    showNotification('认证失败，请先登录文件浏览器', 'error');
                }
            }

            function logout() {
                if (ws) {
                    ws.close();
                    ws = null;
                }
                isAuthenticated = false;
                isTerminalReady = false;
                isConnecting = false;
                sessionId = null;
                updateUIForAuth(false);
                updateWSStatus(false);
                updateStatus('disconnected', '已断开');
                connectBtn.disabled = true;
                disconnectBtn.disabled = true;
                sessionInfo.textContent = '';
                showNotification('已退出登录', 'info');
            }

            // ========== 初始化 ==========
            function init() {
                console.log('交互式终端初始化...');
                loginBtn.addEventListener('click', handleLogin);
                checkAuth();

                document.addEventListener('click', function() {
                    if (terminal && isTerminalReady) {
                        terminal.focus();
                    }
                });
            }

            window.addEventListener('beforeunload', function() {
                if (ws) {
                    ws.close();
                }
            });

            // 暴露全局函数
            window.connectWebSocket = connectWebSocket;
            window.disconnectWebSocket = disconnectWebSocket;
            window.logout = logout;

            init();

        })();
    </script>
</body>
</html>
