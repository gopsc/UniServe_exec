<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💻 交互式终端</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@4.19.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@4.19.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.5.0/lib/xterm-addon-fit.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            background: #0a0a0a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #app {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
        }

        .top-bar {
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid rgba(0, 255, 65, 0.15);
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            height: 48px;
            z-index: 10;
        }

        .top-bar .title {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #00ff41;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .top-bar .title .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .top-bar .title .dot.green {
            background: #00ff41;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        .top-bar .title .dot.yellow {
            background: #ffdd57;
            box-shadow: 0 0 10px rgba(255, 221, 87, 0.5);
        }

        .top-bar .title .dot.red {
            background: #ff3860;
            box-shadow: 0 0 10px rgba(255, 56, 96, 0.5);
        }

        .top-bar .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #8899aa;
            font-size: 13px;
        }

        .top-bar .user-info .username {
            color: #00ff41;
        }

        .top-bar .user-info .status {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .top-bar .user-info .status .dot-small {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .top-bar .user-info .status .dot-small.online {
            background: #00ff41;
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.5);
        }

        .top-bar .user-info .status .dot-small.offline {
            background: #ff3860;
            box-shadow: 0 0 8px rgba(255, 56, 96, 0.5);
        }

        .top-bar .user-info .status .dot-small.connecting {
            background: #ffdd57;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .top-bar .actions {
            display: flex;
            gap: 8px;
        }

        .top-bar .actions button {
            padding: 5px 14px;
            border: 1px solid rgba(0, 255, 65, 0.25);
            border-radius: 4px;
            background: transparent;
            color: #00ff41;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .top-bar .actions button:hover:not(:disabled) {
            background: rgba(0, 255, 65, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.15);
        }

        .top-bar .actions button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .top-bar .actions button.danger {
            border-color: rgba(255, 56, 96, 0.3);
            color: #ff3860;
        }

        .top-bar .actions button.danger:hover:not(:disabled) {
            background: rgba(255, 56, 96, 0.1);
            box-shadow: 0 0 15px rgba(255, 56, 96, 0.15);
        }

        .connection-panel {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid rgba(0, 255, 65, 0.1);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .connection-panel .label {
            color: #8899aa;
            font-size: 12px;
        }

        .connection-panel input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 4px;
            color: #00ff41;
            padding: 5px 10px;
            font-size: 12px;
            font-family: inherit;
            width: 250px;
            outline: none;
        }

        .connection-panel input:focus {
            border-color: rgba(0, 255, 65, 0.5);
        }

        .connection-panel .status-text {
            color: #8899aa;
            font-size: 12px;
        }

        .connection-panel .status-text .online {
            color: #00ff41;
        }

        .connection-panel .status-text .offline {
            color: #ff3860;
        }

        .connection-panel .status-text .connecting {
            color: #ffdd57;
        }

        .connection-panel button {
            padding: 5px 14px;
            border: 1px solid rgba(0, 255, 65, 0.25);
            border-radius: 4px;
            background: transparent;
            color: #00ff41;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .connection-panel button:hover:not(:disabled) {
            background: rgba(0, 255, 65, 0.1);
        }

        .connection-panel button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .terminal-wrapper {
            flex: 1;
            position: relative;
            background: #0a0a0a;
            overflow: hidden;
            cursor: text;
        }

        #terminal-xterm {
            width: 100%;
            height: 100%;
            padding: 0;
            background: #0a0a0a;
        }

        .xterm {
            padding: 0;
            height: 100%;
            width: 100%;
        }
        
        .xterm-viewport {
            overflow-y: auto !important;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 255, 65, 0.3) #0a0a0a;
        }
        
        .xterm-viewport::-webkit-scrollbar {
            width: 8px;
        }
        
        .xterm-viewport::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        
        .xterm-viewport::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 65, 0.25);
            border-radius: 4px;
        }
        
        .xterm-viewport::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 65, 0.4);
        }
        
        .xterm-screen {
            width: 100% !important;
        }
        
        .xterm canvas {
            position: absolute;
            left: 0;
            top: 0;
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-overlay.hidden {
            display: none;
        }

        .login-card {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(0, 255, 65, 0.3);
            padding: 40px 32px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 255, 65, 0.05);
            width: 85%;
            max-width: 380px;
            text-align: center;
        }

        .login-card .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .login-card h3 {
            margin-bottom: 12px;
            font-size: 1.3rem;
            color: #00ff41;
            letter-spacing: 2px;
        }

        .login-card p {
            color: #8899aa;
            font-size: 0.85rem;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        #loginBtn {
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 12px 28px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.95rem;
            width: 100%;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        #loginBtn:hover:not(:disabled) {
            background: rgba(0, 255, 65, 0.1);
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.15);
        }

        #loginBtn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            background: rgba(0, 0, 0, 0.92);
            border-radius: 6px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.6);
            z-index: 2000;
            border: 1px solid rgba(0, 255, 65, 0.15);
            color: #00ff41;
            font-size: 13px;
            max-width: 90%;
            text-align: center;
            animation: slideUp 0.3s ease;
            pointer-events: none;
        }

        .notification.success {
            border-color: rgba(0, 255, 65, 0.3);
        }

        .notification.error {
            border-color: rgba(255, 56, 96, 0.3);
            color: #ff3860;
        }

        .notification.info {
            border-color: rgba(100, 181, 246, 0.3);
            color: #64b5f6;
        }
        
        .notification.warning {
            border-color: rgba(255, 221, 87, 0.3);
            color: #ffdd57;
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        .session-info {
            color: #8899aa;
            font-size: 11px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="login-overlay" id="loginOverlay">
            <div class="login-card">
                <div class="icon">💻</div>
                <h3>交互式终端</h3>
                <p>🔐 需要认证后才能使用<br>请先登录文件浏览器</p>
                <button id="loginBtn">
                    <span id="loginBtnText">验证身份</span>
                </button>
            </div>
        </div>

        <div class="top-bar">
            <div class="title">
                <span class="dot green" id="statusDot"></span>
                <span id="statusText">终端</span>
                <span class="session-info" id="sessionInfo"></span>
            </div>
            <div class="user-info">
                <span class="status">
                    <span class="dot-small offline" id="wsDot"></span>
                    <span id="wsStatusText">未连接</span>
                </span>
                <span class="username" id="usernameDisplay">未认证</span>
                <div class="actions">
                    <button id="disconnectBtn" onclick="disconnectProxy()" disabled class="danger">断开</button>
                    <button onclick="logout()" class="danger">退出</button>
                </div>
            </div>
        </div>

        <div class="connection-panel">
            <span class="label">🔗 后端 WebSocket:</span>
            <input type="text" id="wsTargetUrl" value="ws://localhost:5006" placeholder="ws://host:port">
            <button id="connectBtn" onclick="connectProxy()">连接</button>
            <span class="status-text" id="proxyStatusText">
                <span class="offline">● 未连接</span>
            </span>
            <span style="color: #8899aa; font-size: 12px; margin-left: auto;" id="connectionDetail"></span>
        </div>

        <div class="terminal-wrapper" id="terminalWrapper">
            <div id="terminal-xterm"></div>
        </div>
    </div>

    <script>
        // ========== 全局变量 ==========
        let socket = null;
        let currentSessionId = null;
        let terminal = null;
        let fitAddon = null;
        let resizeTimeout = null;
        let terminalResizeObserver = null;
        let proxyConnected = false;
        let isAuthenticated = false;
        let username = '';
        let isTerminalReady = false;

        // DOM 元素
        const loginOverlay = document.getElementById('loginOverlay');
        const loginBtn = document.getElementById('loginBtn');
        const loginBtnText = document.getElementById('loginBtnText');
        const usernameDisplay = document.getElementById('usernameDisplay');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const sessionInfo = document.getElementById('sessionInfo');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const wsDot = document.getElementById('wsDot');
        const wsStatusText = document.getElementById('wsStatusText');
        const terminalXterm = document.getElementById('terminal-xterm');
        const proxyStatusText = document.getElementById('proxyStatusText');
        const connectionDetail = document.getElementById('connectionDetail');
        const wsTargetUrl = document.getElementById('wsTargetUrl');

        // ========== 通知 ==========
        function showNotification(message, type = 'info') {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();

            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transition = 'opacity 0.3s';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // ========== 更新状态 ==========
        function updateProxyStatus(connected) {
            proxyConnected = connected;
            if (connected) {
                wsDot.className = 'dot-small online';
                wsStatusText.textContent = '已连接';
                proxyStatusText.innerHTML = '<span class="online">● 已连接</span>';
                disconnectBtn.disabled = false;
                connectBtn.disabled = true;
            } else {
                wsDot.className = 'dot-small offline';
                wsStatusText.textContent = '未连接';
                proxyStatusText.innerHTML = '<span class="offline">● 未连接</span>';
                disconnectBtn.disabled = true;
                connectBtn.disabled = false;
                currentSessionId = null;
                isTerminalReady = false;
                sessionInfo.textContent = '';
            }
        }

        function updateStatus(status, message) {
            statusDot.className = 'dot';
            switch(status) {
                case 'connected':
                    statusDot.classList.add('green');
                    statusText.textContent = message || '已连接';
                    break;
                case 'connecting':
                    statusDot.classList.add('yellow');
                    statusText.textContent = message || '连接中...';
                    break;
                case 'error':
                    statusDot.classList.add('red');
                    statusText.textContent = message || '连接失败';
                    break;
                default:
                    statusDot.classList.add('red');
                    statusText.textContent = message || '未连接';
            }
        }

        function updateUIForAuth(authenticated) {
            if (authenticated) {
                loginOverlay.classList.add('hidden');
                usernameDisplay.textContent = username || '用户';
                connectBtn.disabled = false;
            } else {
                loginOverlay.classList.remove('hidden');
                usernameDisplay.textContent = '未认证';
                connectBtn.disabled = true;
                disconnectBtn.disabled = true;
            }
        }

        // ========== 终端管理 ==========
        function initTerminal() {
            destroyTerminal();

            terminalXterm.innerHTML = '';
            
            terminal = new Terminal({
                cursorBlink: true,
                cursorStyle: 'block',
                theme: {
                    background: '#0a0a0a',
                    foreground: '#00ff41',
                    cursor: '#00ff41',
                    selection: 'rgba(0, 255, 65, 0.3)',
                    black: '#0a0a0a',
                    red: '#ff3860',
                    green: '#00ff41',
                    yellow: '#ffdd57',
                    blue: '#64b5f6',
                    magenta: '#b388ff',
                    cyan: '#00e5ff',
                    white: '#f0f0f0'
                },
                fontFamily: 'Menlo, Monaco, "Courier New", monospace',
                fontSize: 14,
                lineHeight: 1.2,
                scrollback: 10000,
                allowTransparency: true,
                macOptionIsMeta: true,
                convertEol: true,
                disableStdin: false,
                screenReaderMode: false
            });

            terminal.open(terminalXterm);

            try {
                if (typeof FitAddon !== 'undefined') {
                    fitAddon = new FitAddon.FitAddon();
                    terminal.loadAddon(fitAddon);
                }
            } catch (e) {
                console.error('Failed to load fit addon:', e);
            }

            if (window.ResizeObserver) {
                terminalResizeObserver = new ResizeObserver(() => {
                    fitTerminalWithDelay();
                });
                terminalResizeObserver.observe(terminalXterm);
            }

            // ========== 关键修复：处理回车键 ==========
            terminal.onData(data => {
                console.log('[Terminal] onData:', JSON.stringify(data));
                
                if (!currentSessionId || !socket || !socket.connected || !proxyConnected) {
                    console.log('[Terminal] Not ready, ignoring');
                    return;
                }

                let commandToSend = data;
                
                // 如果是回车键 (\r)，发送 \n 让 bash 执行命令
                if (data === '\r') {
                    console.log('[Terminal] Enter key detected, sending \\n instead');
                    commandToSend = '\n';
                }
                
                // 如果是退格键，保持原样
                if (data === '\x7f') {
                    commandToSend = '\x7f';
                }

                const message = JSON.stringify({
                    type: 'command',
                    session_id: currentSessionId,
                    command: commandToSend
                });
                console.log('[Terminal] Sending:', message);
                socket.emit('ws_send', { message: message });
            });

            terminal.onResize(size => {
                if (currentSessionId && socket && socket.connected && proxyConnected) {
                    const message = JSON.stringify({
                        type: 'resize',
                        session_id: currentSessionId,
                        cols: size.cols,
                        rows: size.rows
                    });
                    socket.emit('ws_send', { message: message });
                }
            });

            window.addEventListener('resize', () => {
                fitTerminalWithDelay();
            });

            setTimeout(() => fitTerminal(), 100);
            setTimeout(() => fitTerminal(), 300);
            setTimeout(() => fitTerminal(), 500);
        }

        function destroyTerminal() {
            if (terminalResizeObserver) {
                terminalResizeObserver.disconnect();
                terminalResizeObserver = null;
            }
            if (terminal) {
                terminal.dispose();
                terminal = null;
                fitAddon = null;
            }
            if (resizeTimeout) {
                clearTimeout(resizeTimeout);
                resizeTimeout = null;
            }
        }

        function fitTerminal() {
            if (!terminal || !fitAddon) return;
            try {
                fitAddon.fit();
            } catch (e) {
                console.error('Failed to fit terminal:', e);
            }
        }

        function fitTerminalWithDelay() {
            if (resizeTimeout) clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => fitTerminal(), 100);
        }

        // ========== Socket.IO 代理连接 ==========
        function connectProxy() {
            if (socket && socket.connected) {
                showNotification('已经连接', 'info');
                return;
            }

            const targetUrl = wsTargetUrl.value.trim();
            if (!targetUrl) {
                showNotification('请输入目标 WebSocket 地址', 'error');
                return;
            }

            if (!targetUrl.startsWith('ws://') && !targetUrl.startsWith('wss://')) {
                showNotification('WebSocket地址必须以 ws:// 或 wss:// 开头', 'error');
                return;
            }

            if (!isAuthenticated) {
                showNotification('请先验证身份', 'error');
                return;
            }

            showNotification('正在连接 Socket.IO 代理...', 'info');
            updateStatus('connecting', '代理连接中...');

            socket = io(window.location.origin, {
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionAttempts: 5,
                reconnectionDelay: 1000,
                withCredentials: true
            });

            socket.on('connect', () => {
                console.log('Socket.IO 连接成功');
                showNotification('Socket.IO 连接成功，正在连接目标 WebSocket...', 'info');
                socket.emit('ws_connect', { target_url: targetUrl });
            });

            socket.on('ws_connecting', (data) => {
                console.log('正在连接目标:', data);
                showNotification(`正在连接 ${targetUrl}...`, 'info');
                connectionDetail.textContent = `连接中...`;
            });

            socket.on('ws_connected', (data) => {
                console.log('WebSocket 代理连接成功:', data);
                updateProxyStatus(true);
                updateStatus('connected', '代理已就绪');
                connectionDetail.textContent = `已连接到 ${targetUrl}`;
                showNotification('✅ 已连接到 WebSocket 后端', 'success');
                
                if (!terminal) {
                    initTerminal();
                }
                setTimeout(() => terminal?.focus(), 300);
            });

            socket.on('ws_message', (data) => {
                try {
                    let messageData = data;
                    if (typeof data === 'object' && data.data) {
                        messageData = data.data;
                    }
                    const message = JSON.parse(messageData);
                    handleBackendMessage(message);
                } catch (e) {
                    console.error('解析消息失败:', e);
                    if (terminal && typeof data === 'string') {
                        terminal.write(data);
                    } else if (terminal && typeof data === 'object' && data.data) {
                        terminal.write(data.data);
                    }
                }
            });

            socket.on('ws_error', (data) => {
                console.error('WebSocket 代理错误:', data);
                updateProxyStatus(false);
                updateStatus('error', '代理错误');
                connectionDetail.textContent = `错误: ${data.error || '连接失败'}`;
                showNotification(data.error || '代理错误', 'error');
                if (terminal) {
                    terminal.write(`\r\n\x1b[31m错误: ${data.error || '连接失败'}\x1b[0m\r\n`);
                }
            });

            socket.on('ws_disconnected', (data) => {
                console.log('WebSocket 断开:', data);
                updateProxyStatus(false);
                updateStatus('error', '已断开');
                currentSessionId = null;
                isTerminalReady = false;
                sessionInfo.textContent = '';
                connectionDetail.textContent = `已断开`;
                showNotification('WebSocket 连接已断开', 'warning');
                if (terminal) {
                    terminal.write('\r\n\x1b[33m连接已断开\x1b[0m\r\n');
                }
            });

            socket.on('disconnect', () => {
                console.log('Socket.IO 断开');
                updateProxyStatus(false);
                updateStatus('error', 'Socket断开');
                currentSessionId = null;
                isTerminalReady = false;
                sessionInfo.textContent = '';
                connectionDetail.textContent = 'Socket.IO 断开';
                showNotification('Socket.IO 连接断开', 'warning');
            });

            socket.on('connect_error', (error) => {
                console.error('Socket.IO 连接错误:', error);
                updateStatus('error', '连接失败');
                showNotification(`连接错误: ${error.message}`, 'error');
            });
        }

        function disconnectProxy() {
            if (socket) {
                if (currentSessionId && isTerminalReady) {
                    const message = JSON.stringify({
                        type: 'disconnect',
                        session_id: currentSessionId
                    });
                    socket.emit('ws_send', { message: message });
                }
                socket.disconnect();
                socket = null;
            }
            updateProxyStatus(false);
            updateStatus('disconnected', '已断开');
            currentSessionId = null;
            isTerminalReady = false;
            sessionInfo.textContent = '';
            connectionDetail.textContent = '';
            showNotification('已断开连接', 'info');
        }

        // ========== 消息处理 ==========
        function handleBackendMessage(message) {
            const msgType = message.type || '';

            switch(msgType) {
                case 'connected':
                    currentSessionId = message.session_id;
                    isTerminalReady = true;
                    updateStatus('connected', '终端就绪');
                    sessionInfo.textContent = `会话: ${currentSessionId.substring(0, 8)}`;
                    showNotification('✅ 终端会话已建立', 'success');
                    setTimeout(() => terminal?.focus(), 200);
                    break;

                case 'output':
                    if (message.data && terminal) {
                        terminal.write(message.data);
                    }
                    break;

                case 'info':
                    showNotification(message.message, 'info');
                    break;

                case 'error':
                    showNotification(message.message || '未知错误', 'error');
                    if (terminal) {
                        terminal.write(`\r\n\x1b[31m错误: ${message.message || '未知错误'}\x1b[0m\r\n`);
                    }
                    break;

                case 'disconnected':
                    isTerminalReady = false;
                    currentSessionId = null;
                    sessionInfo.textContent = '';
                    showNotification(`⚠️ ${message.message || '连接已断开'}`, 'warning');
                    if (terminal) {
                        terminal.write(`\r\n\x1b[33m${message.message || '连接已断开'}\x1b[0m\r\n`);
                    }
                    break;

                default:
                    if (message.data && terminal) {
                        terminal.write(message.data);
                    } else if (message.message) {
                        showNotification(message.message, 'info');
                    }
            }
        }

        // ========== 认证 ==========
        async function checkAuth() {
            try {
                console.log('Checking authentication status...');
                
                const response = await fetch('/api/check-auth', {
                    credentials: 'include',
                    headers: { 'Accept': 'application/json' }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Auth data:', data);
                isAuthenticated = data.authenticated;
                
                if (isAuthenticated) {
                    username = data.user?.username || '用户';
                    updateUIForAuth(true);
                    showNotification(`✅ 已认证: ${username}`, 'success');
                } else {
                    updateUIForAuth(false);
                    showNotification('🔒 请先登录文件浏览器', 'warning');
                }
            } catch (error) {
                console.warn('认证检查失败:', error);
                updateUIForAuth(false);
                showNotification('认证检查失败，请刷新重试', 'error');
            }
        }

        async function handleLogin() {
            loginBtn.disabled = true;
            loginBtnText.textContent = '验证中...';
            console.log('Login button clicked');
            
            await checkAuth();
            
            if (isAuthenticated) {
                loginBtnText.textContent = '✅ 已验证';
                setTimeout(() => {
                    loginBtn.disabled = false;
                    loginBtnText.textContent = '验证身份';
                }, 2000);
            } else {
                loginBtn.disabled = false;
                loginBtnText.textContent = '重新验证';
                showNotification('认证失败，请先登录文件浏览器', 'error');
            }
        }

        function logout() {
            if (socket) {
                socket.disconnect();
                socket = null;
            }
            isAuthenticated = false;
            isTerminalReady = false;
            currentSessionId = null;
            updateUIForAuth(false);
            updateProxyStatus(false);
            updateStatus('disconnected', '已断开');
            sessionInfo.textContent = '';
            connectionDetail.textContent = '';
            showNotification('已退出登录', 'info');
        }

        // ========== 点击终端聚焦 ==========
        document.getElementById('terminalWrapper').addEventListener('click', function() {
            if (terminal && isTerminalReady) {
                terminal.focus();
                console.log('[Terminal] Focused by click');
            }
        });

        // ========== 初始化 ==========
        function init() {
            console.log('交互式终端初始化...');
            loginBtn.addEventListener('click', handleLogin);
            checkAuth();

            wsTargetUrl.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    connectProxy();
                }
            });

            initTerminal();
        }

        window.addEventListener('beforeunload', function() {
            if (socket) {
                socket.disconnect();
            }
        });

        // 暴露全局函数
        window.connectProxy = connectProxy;
        window.disconnectProxy = disconnectProxy;
        window.logout = logout;

        init();
    </script>
</body>
</html>
